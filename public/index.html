<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Finanças" />
  <title>Finanças Pessoais</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <header id="header">
      <div class="header-top">
        <div class="app-logo">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
        </div>
        <h1>Finanças</h1>
      </div>
      <nav id="tabs">
        <button class="tab active" data-tab="chat">Chat</button>
        <button class="tab" data-tab="report">Relatório</button>
        <button class="tab" data-tab="settings">Config</button>
      </nav>
    </header>

    <!-- CHAT TAB -->
    <section id="tab-chat" class="tab-content active">
      <div id="messages"></div>

      <div id="transcription-hint">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Transcrição recebida — edite se precisar e envie
      </div>

      <div id="input-area">
        <button id="rec-btn" aria-label="Gravar áudio">
          <!-- idle -->
          <svg class="icon-mic" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
          <!-- transcribing spinner -->
          <svg class="icon-spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
          </svg>
          <!-- recording: timer text -->
          <span class="rec-timer">0:00</span>
        </button>

        <div class="input-wrapper">
          <textarea id="user-input" placeholder="Conte seus gastos, receitas..." rows="1"></textarea>
          <button id="send-btn" aria-label="Enviar">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </section>

    <!-- REPORT TAB -->
    <section id="tab-report" class="tab-content">
      <div id="report-filters">
        <select id="filter-month"></select>
        <select id="filter-tipo">
          <option value="">Todos</option>
          <option value="gasto">Gastos</option>
          <option value="receita">Receitas</option>
          <option value="divida">Dívidas</option>
        </select>
        <button id="btn-load-report">Buscar</button>
      </div>
      <div id="report-content"></div>
    </section>

    <!-- SETTINGS TAB -->
    <section id="tab-settings" class="tab-content">
      <div class="settings-form">
        <h2>Configurações</h2>

        <div class="settings-section">
          <label for="cfg-worker">URL do Worker (Cloudflare)</label>
          <input type="url" id="cfg-worker" placeholder="https://financa.SEU-USUARIO.workers.dev" autocomplete="off" />
          <p class="settings-hint">A URL é salva localmente neste dispositivo. As chaves de API ficam no servidor.</p>
        </div>

        <button id="btn-save-settings">Salvar configurações</button>
        <p id="settings-msg"></p>
      </div>
    </section>

  </div>

  <!-- BOTTOM SHEET — editar transação -->
  <div id="sheet-overlay"></div>
  <div id="edit-sheet" role="dialog" aria-modal="true" aria-label="Editar transação">
    <div id="sheet-handle"></div>
    <h3 id="sheet-title">Editar transação</h3>

    <div class="sheet-field">
      <label>Tipo</label>
      <div class="tipo-pills">
        <button class="tipo-pill active" data-tipo="gasto">Gasto</button>
        <button class="tipo-pill" data-tipo="receita">Receita</button>
        <button class="tipo-pill" data-tipo="divida">Dívida</button>
      </div>
    </div>

    <div class="sheet-field">
      <label for="sheet-valor">Valor (R$)</label>
      <input type="number" id="sheet-valor" inputmode="decimal" placeholder="0,00" min="0.01" step="0.01" />
    </div>

    <div class="sheet-field">
      <label for="sheet-categoria">Categoria</label>
      <select id="sheet-categoria"></select>
    </div>

    <div class="sheet-field">
      <label for="sheet-descricao">Descrição</label>
      <input type="text" id="sheet-descricao" placeholder="Ex: Mercado, Uber..." />
    </div>

    <button id="sheet-save">Salvar alterações</button>
    <p id="sheet-msg"></p>
  </div>

  <script src="app.js"></script>
</body>
</html>
